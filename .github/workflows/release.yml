name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

jobs:
  publish:
    if: github.repository == 'effect-native/pad'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@^11.5.1

      - name: Verify npm supports trusted publishing
        run: |
          NPM_VERSION="$(npm --version)"
          echo "npm ${NPM_VERSION}"
          node -e "const v=process.argv[1].split('.').map(Number); if (!(v[0] > 11 || (v[0] === 11 && v[1] >= 5))) process.exit(1)" "$NPM_VERSION"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release artifact
        run: bun run verify:release

      - name: Verify package version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${GITHUB_REF_TYPE}" = "branch" ] && [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Manual releases must run from main, not ${GITHUB_REF_NAME}"
            exit 1
          fi
          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ "${GITHUB_REF_NAME}" != "v${VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${VERSION}"
            exit 1
          fi
          if npm view "note@${VERSION}" version >/dev/null 2>&1; then
            echo "note@${VERSION} already exists on npm"
            exit 1
          fi

      - name: OIDC preflight
        run: |
          test -n "$ACTIONS_ID_TOKEN_REQUEST_URL"
          test -n "$ACTIONS_ID_TOKEN_REQUEST_TOKEN"
          unset NODE_AUTH_TOKEN
          unset NPM_CONFIG_USERCONFIG
          npm ping
          if npm whoami >/dev/null 2>&1; then
            echo "Unexpected npm auth present before OIDC publish"
            exit 1
          fi

      - name: Publish with OIDC provenance
        run: |
          unset NODE_AUTH_TOKEN
          unset NPM_CONFIG_USERCONFIG
          NPM_TAG="$(node -p "require('./package.json').version.includes('-') ? 'beta' : 'latest'")"
          npm publish --provenance --access public --tag "$NPM_TAG"

      - name: Verify published package
        run: bun run verify:published
